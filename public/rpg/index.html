<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Life RPG</title>
  <link rel="stylesheet" href="/rpg/css/rpg.css" />
</head>
<body>
  <!-- HEADER -->
  <header class="rpg-header">
    <div class="header-brand">
      <span class="brand-icon">⚔️</span>
      <span class="brand-name">Life RPG</span>
    </div>
    <div class="header-char" id="headerChar">
      <span id="headerAvatar">🧙</span>
      <div class="header-char-info">
        <span id="headerName">Hero</span>
        <span id="headerLevel" class="level-badge">Lv.1</span>
      </div>
    </div>
    <div class="header-stats">
      <div class="header-xp">
        <div class="xp-bar-mini">
          <div class="xp-fill-mini" id="headerXpFill" style="width:0%"></div>
        </div>
        <span id="headerXpText" class="xp-text-mini">0 XP</span>
      </div>
      <div class="header-coins">
        <span class="coin-icon">🪙</span>
        <span id="headerCoins">0</span>
      </div>
    </div>
  </header>

  <!-- TAB NAV -->
  <nav class="rpg-nav">
    <button class="tab-btn active" data-tab="dashboard">📊 Dashboard</button>
    <button class="tab-btn" data-tab="habits">🔄 Habits</button>
    <button class="tab-btn" data-tab="tasks">✅ Tasks</button>
    <button class="tab-btn" data-tab="rewards">🎁 Rewards</button>
    <button class="tab-btn" data-tab="character">🧙 Character</button>
  </nav>

  <!-- MAIN CONTENT -->
  <main class="rpg-main">

    <!-- DASHBOARD TAB -->
    <section class="tab-panel active" id="tab-dashboard">
      <div class="dash-grid">
        <div class="dash-section" id="dashStatGrid"></div>
        <div class="dash-section">
          <h3 class="section-title">Today's Habits</h3>
          <div id="dashHabits" class="today-habits"></div>
        </div>
        <div class="dash-section">
          <h3 class="section-title">Recent Activity</h3>
          <div id="dashActivity" class="activity-feed"></div>
        </div>
        <div class="dash-section" id="dashSnapshot"></div>
      </div>
    </section>

    <!-- HABITS TAB -->
    <section class="tab-panel" id="tab-habits">
      <div class="tab-toolbar">
        <button class="btn btn-primary" id="btnAddHabit">+ New Habit</button>
      </div>
      <div id="habitForm" class="inline-form hidden">
        <h4 id="habitFormTitle">New Habit</h4>
        <input type="hidden" id="habitFormId" />
        <div class="form-row">
          <label>Title *</label>
          <input type="text" id="habitTitle" placeholder="e.g. Morning run" maxlength="200" />
        </div>
        <div class="form-row">
          <label>Notes</label>
          <textarea id="habitNotes" rows="2" placeholder="Optional details..."></textarea>
        </div>
        <div class="form-row">
          <label>Difficulty</label>
          <div class="seg-btns" id="habitDifficulty">
            <button class="seg-btn active" data-val="Easy">Easy</button>
            <button class="seg-btn" data-val="Medium">Medium</button>
            <button class="seg-btn" data-val="Hard">Hard</button>
            <button class="seg-btn" data-val="Epic">Epic</button>
          </div>
        </div>
        <div class="form-row">
          <label>Stat Target</label>
          <select id="habitStat">
            <option value="none">None</option>
            <option value="str">STR — Strength</option>
            <option value="int">INT — Intelligence</option>
            <option value="vit">VIT — Vitality</option>
            <option value="dex">DEX — Dexterity</option>
            <option value="cha">CHA — Charisma</option>
          </select>
        </div>
        <div class="form-actions">
          <button class="btn btn-primary" id="habitFormSave">Save</button>
          <button class="btn btn-ghost" id="habitFormCancel">Cancel</button>
        </div>
      </div>
      <div id="habitList" class="card-list"></div>
    </section>

    <!-- TASKS TAB -->
    <section class="tab-panel" id="tab-tasks">
      <div class="tab-toolbar">
        <button class="btn btn-primary" id="btnAddTask">+ New Task</button>
        <div class="filter-row">
          <div class="seg-btns" id="taskFilter">
            <button class="seg-btn active" data-val="active">Active</button>
            <button class="seg-btn" data-val="completed">Completed</button>
            <button class="seg-btn" data-val="all">All</button>
          </div>
          <select id="taskSort">
            <option value="created_at">Newest</option>
            <option value="due_date">Due Date</option>
            <option value="priority">Priority</option>
            <option value="difficulty">Difficulty</option>
          </select>
        </div>
      </div>
      <div id="taskForm" class="inline-form hidden">
        <h4 id="taskFormTitle">New Task</h4>
        <input type="hidden" id="taskFormId" />
        <div class="form-row">
          <label>Title *</label>
          <input type="text" id="taskTitle" placeholder="e.g. Write report" maxlength="200" />
        </div>
        <div class="form-row">
          <label>Notes</label>
          <textarea id="taskNotes" rows="2" placeholder="Optional details..."></textarea>
        </div>
        <div class="form-row form-row-split">
          <div>
            <label>Difficulty</label>
            <div class="seg-btns" id="taskDifficulty">
              <button class="seg-btn active" data-val="Easy">Easy</button>
              <button class="seg-btn" data-val="Medium">Medium</button>
              <button class="seg-btn" data-val="Hard">Hard</button>
              <button class="seg-btn" data-val="Epic">Epic</button>
            </div>
          </div>
          <div>
            <label>Priority</label>
            <select id="taskPriority">
              <option value="low">Low</option>
              <option value="normal" selected>Normal</option>
              <option value="high">High</option>
            </select>
          </div>
        </div>
        <div class="form-row form-row-split">
          <div>
            <label>Due Date</label>
            <input type="date" id="taskDueDate" />
          </div>
          <div>
            <label>Stat Target</label>
            <select id="taskStat">
              <option value="none">None</option>
              <option value="str">STR</option>
              <option value="int">INT</option>
              <option value="vit">VIT</option>
              <option value="dex">DEX</option>
              <option value="cha">CHA</option>
            </select>
          </div>
        </div>
        <div class="form-actions">
          <button class="btn btn-primary" id="taskFormSave">Save</button>
          <button class="btn btn-ghost" id="taskFormCancel">Cancel</button>
        </div>
      </div>
      <div id="taskList" class="card-list"></div>
    </section>

    <!-- REWARDS TAB -->
    <section class="tab-panel" id="tab-rewards">
      <div class="rewards-header">
        <div class="coin-balance">
          <span class="coin-icon-lg">🪙</span>
          <span id="rewardCoins" class="coin-amount">0</span>
          <span class="coin-label">coins</span>
        </div>
        <button class="btn btn-primary" id="btnAddReward">+ New Reward</button>
      </div>
      <div id="rewardForm" class="inline-form hidden">
        <h4 id="rewardFormTitle">New Reward</h4>
        <input type="hidden" id="rewardFormId" />
        <div class="form-row form-row-split">
          <div>
            <label>Icon (emoji)</label>
            <input type="text" id="rewardIcon" placeholder="🎁" maxlength="4" style="width:60px;font-size:1.5rem;text-align:center" />
          </div>
          <div style="flex:1">
            <label>Title *</label>
            <input type="text" id="rewardTitle" placeholder="e.g. Bubble tea" maxlength="200" />
          </div>
        </div>
        <div class="form-row form-row-split">
          <div>
            <label>Cost (coins)</label>
            <input type="number" id="rewardCost" min="1" value="10" />
          </div>
          <div style="flex:1">
            <label>Notes</label>
            <input type="text" id="rewardNotes" placeholder="Optional description" />
          </div>
        </div>
        <div class="form-actions">
          <button class="btn btn-primary" id="rewardFormSave">Save</button>
          <button class="btn btn-ghost" id="rewardFormCancel">Cancel</button>
        </div>
      </div>
      <div id="rewardGrid" class="reward-grid"></div>
    </section>

    <!-- CHARACTER TAB -->
    <section class="tab-panel" id="tab-character">
      <div class="char-layout">
        <div class="char-left">
          <div class="char-avatar-section">
            <div class="char-avatar-picker" id="avatarPicker"></div>
            <div class="char-identity">
              <input type="text" id="charName" class="char-name-input" maxlength="60" />
              <input type="text" id="charClass" class="char-class-input" maxlength="60" placeholder="Class..." />
              <button class="btn btn-sm btn-primary" id="charSaveBtn">Save</button>
            </div>
          </div>
          <div class="char-level-section">
            <div class="level-orb" id="charLevelOrb">1</div>
            <div class="char-xp-section">
              <div class="xp-bar-full">
                <div class="xp-fill-full" id="charXpFill" style="width:0%"></div>
              </div>
              <div class="xp-numbers" id="charXpNumbers">0 / 100 XP</div>
            </div>
          </div>
          <div class="char-stats-panel" id="charStatsPanel"></div>
        </div>
        <div class="char-right">
          <div class="lifetime-stats" id="lifetimeStats"></div>
          <h3 class="section-title">Unlockables</h3>
          <div id="unlockablesGallery" class="unlockables-gallery"></div>
        </div>
      </div>
    </section>

  </main>

  <!-- MODALS -->
  <div id="modalOverlay" class="modal-overlay hidden">
    <!-- Level Up Modal -->
    <div id="levelUpModal" class="modal hidden">
      <div class="modal-icon">⬆️</div>
      <h2>Level Up!</h2>
      <div class="modal-level" id="modalLevelNum">2</div>
      <p id="modalLevelMsg">You reached a new level!</p>
      <button class="btn btn-primary" id="modalLevelClose">Awesome!</button>
    </div>
    <!-- Purchase Confirm Modal -->
    <div id="purchaseModal" class="modal hidden">
      <div class="modal-icon" id="purchaseIcon">🎁</div>
      <h2 id="purchaseTitle">Confirm Purchase</h2>
      <p id="purchaseMsg"></p>
      <div class="modal-actions">
        <button class="btn btn-primary" id="purchaseConfirm">Buy it!</button>
        <button class="btn btn-ghost" id="purchaseCancel">Cancel</button>
      </div>
    </div>
  </div>

  <!-- TOAST CONTAINER -->
  <div id="toastContainer" class="toast-container"></div>

  <script src="/rpg/js/api.js"></script>
  <script src="/rpg/js/dashboard.js"></script>
  <script src="/rpg/js/habits.js"></script>
  <script src="/rpg/js/tasks.js"></script>
  <script src="/rpg/js/rewards.js"></script>
  <script src="/rpg/js/character.js"></script>
  <script src="/rpg/js/app.js"></script>
</body>
</html>
